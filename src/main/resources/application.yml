spring:
  application:
    name: ai-learning-platform-backend
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
    jwt-expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:720}
  crypto:
    aes-key: ${APP_AES_KEY:change-this-32-byte-dev-key-0001}
